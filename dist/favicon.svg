<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="One speaking figure with a small voice wave, flanked by two listening figures">
  <!--
    A3.6 — evolution of A3.2 that merges in A6's "active speaker" idea.
    Custom-drawn trio (not the stock Phosphor glyph): the centre figure
    is larger, in front, at full opacity — the one speaking. The two
    flanking figures recede at half opacity — listening. A compact
    five-bar Siri-style voice mark sits directly above the speaker's
    head. This is the most literal encoding of what Confab actually
    does: one voice at a time, strict scheduling, a room that listens.
  -->
  <defs>
    <radialGradient id="bg36" cx="50%" cy="38%" r="78%">
      <stop offset="0%"  stop-color="#2f343f"/>
      <stop offset="100%" stop-color="#0f1116"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#bg36)"/>

  <!-- Listening figures (behind, receded) -->
  <g fill="#f1f5f9" fill-opacity="0.45">
    <circle cx="306" cy="530" r="78"/>
    <path d="M 174 850 L 174 782 A 132 132 0 0 1 438 782 L 438 850 Z"/>
    <circle cx="718" cy="530" r="78"/>
    <path d="M 586 850 L 586 782 A 132 132 0 0 1 850 782 L 850 850 Z"/>
  </g>

  <!-- Speaking figure (front, full opacity). The dark stroke behind
       the fill carves a separation gap from the figures behind. -->
  <g fill="#f1f5f9" stroke="#10131a" stroke-width="26" paint-order="stroke">
    <circle cx="512" cy="470" r="100"/>
    <path d="M 332 870 L 332 790 A 180 180 0 0 1 692 790 L 692 870 Z"/>
  </g>

  <!-- Compact voice mark above the speaker's head only. -->
  <g fill="#f1f5f9">
    <rect x="409" y="257" width="22" height="56"  rx="11"/>
    <rect x="455" y="233" width="22" height="104" rx="11"/>
    <rect x="501" y="213" width="22" height="144" rx="11"/>
    <rect x="547" y="233" width="22" height="104" rx="11"/>
    <rect x="593" y="257" width="22" height="56"  rx="11"/>
  </g>
</svg>
