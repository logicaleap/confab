# Cloudflare static-assets deploy for the Confab marketing site.
# This repo holds the COMPILED site (dist/) — there is NO build step here;
# Cloudflare serves dist/ as-is:
#   npx wrangler deploy
name = "confab"
compatibility_date = "2025-01-01"

# Production custom domain (auto-provisioned on deploy if logicaleap.com is a
# Cloudflare zone in this account).
routes = [{ pattern = "confab.logicaleap.com", custom_domain = true }]

[assets]
directory = "./dist"
# Serve index.html (200) for unknown paths so client-side routing works.
not_found_handling = "single-page-application"
